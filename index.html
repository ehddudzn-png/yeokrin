<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>역린</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *{margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0a0c10; --panel:#14181f; --panel2:#1a1f28;
    --line:#272d38; --line2:#333b48;
    --txt:#c9cdd4; --muted:#7b828f; --dim:#565d6a;
    --amber:#c9a227; --blood:#9b3b3b; --blood-soft:#74302f;
    --rain:rgba(150,178,214,.5);
  }
  html,body{height:100%;}
  body{
    font-family:"Noto Sans KR",-apple-system,sans-serif;
    background:var(--bg); color:var(--txt);
    min-height:100dvh; overflow-x:hidden;
    display:flex; justify-content:center;
  }
  #wrap{width:100%; max-width:480px; min-height:100dvh; position:relative; padding:0 22px;
    display:flex; flex-direction:column; align-items:center;}

  /* 비 배경 */
  #rain{position:fixed; inset:0; max-width:480px; margin:0 auto; pointer-events:none; z-index:1; opacity:.35;}

  .inner{position:relative; z-index:2; width:100%; display:flex; flex-direction:column; align-items:center;
    flex:1; justify-content:center; padding:54px 0 40px;}

  /* 로고 */
  .logo{margin-bottom:20px;}
  .m-tag{font-family:'Syne Mono',monospace; font-size:11px; letter-spacing:.42em; color:var(--dim); text-align:center; margin-bottom:12px; padding-left:.42em;}
  h1{font-family:"Gowun Batang",serif; font-weight:700; font-size:64px; letter-spacing:.18em; padding-left:.18em; text-align:center; color:#eef0f3; line-height:1;}
  .m-line{width:42px; height:2px; background:var(--blood); margin:20px auto 10px; opacity:.8;}
  .sub{font-size:12.5px; color:var(--muted); text-align:center; letter-spacing:.04em; margin-bottom:40px; line-height:1.7;}

  /* 사건 카드 */
  .cases{width:100%; display:flex; flex-direction:column; gap:14px;}
  .case-card{position:relative; display:block; width:100%; border:1px solid var(--line2); border-radius:16px;
    background:linear-gradient(150deg,rgba(20,24,31,.82),rgba(26,31,40,.82)); backdrop-filter:blur(2px); padding:22px 20px; cursor:pointer;
    text-decoration:none; color:inherit; overflow:hidden; transition:.22s; -webkit-user-select:none; user-select:none;}
  .case-card:active{transform:scale(.985);}
  .case-card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--blood); opacity:.55;}
  .cc-no{font-family:'Syne Mono',monospace; font-size:11px; letter-spacing:.28em; color:var(--amber); margin-bottom:9px;}
  .cc-title{font-family:"Gowun Batang",serif; font-weight:700; font-size:30px; letter-spacing:.14em; color:#eef0f3; line-height:1.1; padding-left:.12em;}
  .cc-han{font-size:13px; color:var(--dim); font-weight:400; letter-spacing:.1em; margin-left:6px;}
  .cc-desc{font-size:12.5px; color:var(--muted); margin-top:10px; line-height:1.6;}
  .cc-go{position:absolute; right:18px; bottom:18px; font-size:12px; color:var(--dim); letter-spacing:.05em;}
  .case-card.locked{opacity:.5; cursor:default;}
  .case-card.locked::before{background:var(--dim);}
  .lock-tag{position:absolute; right:18px; top:20px; font-size:10.5px; color:var(--dim); border:1px solid var(--line2); border-radius:20px; padding:3px 10px; letter-spacing:.05em;}


  /* 히어로 풀스크린 배경 */
  #heroBg{position:fixed; inset:0; max-width:480px; margin:0 auto; z-index:0; overflow:hidden; background:#0a0c10;}
  #heroBg img{width:100%; height:100%; object-fit:cover; display:block;}
  #heroBg::after{content:""; position:absolute; inset:0; background:linear-gradient(to bottom, rgba(10,12,16,.55) 0%, rgba(10,12,16,.72) 45%, rgba(10,12,16,.92) 100%);}
  /* 카드 썸네일 */
  .cc-thumb{position:relative; width:100%; height:120px; border-radius:11px; overflow:hidden; margin-bottom:14px; background:#0e1218; border:1px solid var(--line);}
  .cc-thumb img{width:100%; height:100%; object-fit:cover; display:block; opacity:.92;}
  .cc-thumb::after{content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(10,12,16,.55), transparent 60%);}
  .cc-thumb-fb{width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#10141b; color:#2f3540; font-size:30px; font-family:"Gowun Batang",serif;}
  .case-card.locked .cc-thumb{filter:grayscale(1) brightness(.5);}

  .foot{margin-top:34px; font-size:10.5px; color:var(--dim); letter-spacing:.1em; text-align:center;}
</style>
</head>
<body>
<div id="wrap">
  <svg id="rain" preserveAspectRatio="none" viewBox="0 0 480 900"></svg>
  <div id="heroBg"><img src="main/hero.png" alt="" onerror="this.style.display='none';"></div>
    <div class="inner">

    <div class="logo">
      <svg width="74" height="74" viewBox="0 0 78 78" fill="none">
        <circle cx="39" cy="39" r="36" stroke="#2a313d" stroke-width="1.5"/>
        <path d="M39 16 C28 24 24 34 39 62 C54 34 50 24 39 16 Z" stroke="#9b3b3b" stroke-width="2" fill="none"/>
        <path d="M39 24 C33 30 32 38 39 52 C46 38 45 30 39 24 Z" stroke="#c9a227" stroke-width="1.6" fill="none" opacity=".8"/>
        <line x1="39" y1="30" x2="39" y2="48" stroke="#c9a227" stroke-width="1.4" opacity=".6"/>
      </svg>
    </div>
    <div class="m-tag">MYSTERY FILE</div>
    <h1>역린</h1>
    <div class="m-line"></div>
    <div class="sub">진실은, 가장 보고 싶지 않은 곳에 있다.<br>사건을 골라 수사를 시작하라.</div>

    <div class="cases">
      <a class="case-card" href="case002.html">
        <div class="cc-thumb"><img src="main/c002.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="cc-thumb-fb" style="display:none;">雪</div></div>
        <div class="cc-no">CASE · 002</div>
        <div class="cc-title">설흔<span class="cc-han">雪痕</span></div>
        <div class="cc-desc">눈 덮인 산장, 단 한 줄의 발자국.<br>그 밤, 무슨 일이 있었나.</div>
        <div class="cc-go">수사 →</div>
      </a>

      <a class="case-card" href="case003.html">
        <div class="cc-thumb"><img src="main/c003.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="cc-thumb-fb" style="display:none;">回</div></div>
        <div class="cc-no">CASE · 003</div>
        <div class="cc-title">회귀<span class="cc-han">回歸</span></div>
        <div class="cc-desc">고층 사옥에서 떨어진 이사장.<br>범인은 시작일 뿐 — 진짜 질문은, 왜.</div>
        <div class="cc-go">수사 →</div>
      </a>

      <div class="case-card locked">
        <div class="lock-tag">잠김</div>
        <div class="cc-no">CASE · 004</div>
        <div class="cc-title">??<span class="cc-han">?</span></div>
        <div class="cc-desc">다음 사건은 곧 공개됩니다.</div>
      </div>
    </div>

    <div class="foot">役鱗 · 逆鱗</div>
  </div>
</div>

<script>
(function rain(){
  const svg=document.getElementById('rain'); if(!svg) return; let s='';
  const seed=[3,7,11,17,23,31,41,53,61,71,83,97,103,113,127,139,151,163,179,191];
  for(let i=0;i<46;i++){
    const x=(i*41+ (seed[i%seed.length])) % 480;
    const len=(16+ (seed[i%seed.length]%4)*7);
    const dur=(0.9+ (i%6)*0.28).toFixed(2);
    const delay=(-(i%12)*0.5).toFixed(2);
    const op=(0.10+ (i%4)*0.06).toFixed(2);
    s+=`<line x1="${x}" y1="-${len}" x2="${x+5}" y2="0" stroke="var(--rain)" stroke-width="1.1" opacity="${op}">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="40 960" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>
    </line>`;
  }
  svg.innerHTML=s;
})();
</script>
</body>
</html>
